<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="{{ path_prefix }}/static/js/status_update.js"></script>
    <script src="{{ path_prefix }}/static/js/station_list.js"></script>
</head>

<script>
    const data = {{ data | tojson }};

</script>


<body class="min-h-screen bg-indigo-50 text-slate-900">
    <div class="relative overflow-hidden">
        <div class="absolute inset-x-0 top-0 h-64 bg-gradient-to-b from-sky-200/70 via-indigo-100/40 to-transparent"></div>
        <div class="absolute -top-16 left-1/2 h-56 w-[42rem] -translate-x-1/2 rounded-full bg-white/55 blur-3xl"></div>

        <header class="relative">


            <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-6 pb-4">
                <div class="relative overflow-hidden rounded-[2rem] border border-white/70 bg-white/90 shadow-sm backdrop-blur">
                    <div class="absolute inset-x-0 top-0 sm:h-24 h-21 bg-gradient-to-r from-sky-400/20 via-cyan-300/10 to-indigo-400/20"></div>
                    <div class="relative px-4 py-4 sm:px-8 sm:py-8">

                            <div class="max-w-2xl">

                                <button

                                    class="justify-self-center sm:inline-flex items-center gap-2 rounded-full border border-sky-200 bg-sky-50 px-3 py-1 text-xs font-medium tracking-[0.18em] text-sky-700 uppercase transition hover:border-sky-300 hover:bg-sky-100" >

                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="relative max-w-6xl mx-auto px-4 sm:px-6 pb-10 pt-4">
            <section id="station-list" class="grid gap-4 lg:grid-cols-2"></section>
        </main>

        <footer class="max-w-7xl mx-auto px-4 sm:px-6 pb-10 pt-2 text-xs text-slate-400">
